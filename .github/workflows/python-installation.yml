name: Installing Python

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        py-version: [3.10.0,3.11,3.12]
        # exclude:
        #   - os: [macos-14, windows-latest]
        #     py-version: [3.10.20]

    runs-on: ${{matrix.os}}

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{matrix.py-version}}
        
