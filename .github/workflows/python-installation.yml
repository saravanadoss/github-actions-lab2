name: Installing Python

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu 20.4, windows-latest]
        py-version: [3.10.20,3.11,3.12]
        exclude:
          - py-version: 3.10.20
            os: windows-latest

    runs-on: ${{matrix.os}}

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{matrix.py-version}}
        
